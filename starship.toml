# In .config/starship.toml
# Ensure any Nerd font is installed
add_newline = false
command_timeout = 800

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$java\
$rust\
$golang\
$docker_context\
$cmd_duration\
$line_break\
$character"""

# Hide username unless you are in an SSH session or logged in as root
[username]
style_user = "bold blue"
style_root = "bold red"
format = "[$user]($style) "
show_always = false 

# Hide hostname unless in an SSH session
[hostname]
ssh_only = true
format = "[@$hostname](bold dim yellow) "

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"
read_only = " 󰌾"
format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = " "
style = "bold purple"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold red"
format = "[$all_status$ahead_behind]($style) "

# --- Languages & Tools ---
[nodejs]
symbol = " "
style = "bold green"
format = "[$symbol($version )]($style)"

[java]
symbol = " "
style = "bold blue"
format = "[$symbol($version )]($style)"

[python]
symbol = " "
style = "bold yellow"
format = "[$symbol($virtualenv )($version )]($style)"

[rust]
symbol = " "
style = "bold red"
format = "[$symbol($version )]($style)"

[golang]
symbol = " "
style = "bold cyan"
format = "[$symbol($version )]($style)"

[docker_context]
symbol = " "
style = "bold blue"
format = "[$symbol$context]($style) "

# --- Time & Prompt ---
[cmd_duration]
min_time = 200
# Swapped "took" for a clean hourglass icon to maintain minimalism
format = " [$duration](yellow) "

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
